---
name: Release Please

# Drives semver bumping via release-please. On every push to main this
# workflow opens (or updates) a release PR with the next version's CHANGELOG
# bump. Merging that PR creates the vX.Y.Z tag and GitHub release.
#
# Per-repo config: release-please-config.json and .release-please-manifest.json
#
# NOTE: set the GitHub App credentials (RELEASE_PLEASE_APP_ID variable and
# RELEASE_PLEASE_APP_PRIVATE_KEY secret) so release PRs trigger CI status
# checks. Without them, release PRs open under GITHUB_TOKEN, which by GitHub
# design does not fire pull_request events. See:
# https://github.com/DevSecNinja/.github/blob/main/docs/release-please-onboarding.md

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-please:
    uses: DevSecNinja/.github/.github/workflows/release-please.yml@783a7a3a03ae71efcdf5b13eaea80efe26dfa641 # v2.2.0
    permissions:
      contents: write
      pull-requests: write
    with:
      app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
    secrets:
      app-private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
