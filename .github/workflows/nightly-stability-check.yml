---
name: Nightly Stability Check

# Verifies the function is actually running: queries Application Insights for
# recent "Schedule pass complete" traces and fails if none are found in the
# lookback window. It deliberately does NOT assert that any VM was started or
# stopped — cron schedules on VM tags aren't guaranteed to fall in the window —
# only that the function executed its scheduled passes.

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  # Wider than 24h to tolerate scheduling jitter / missed ticks.
  LOOKBACK_HOURS: "26"

jobs:
  stability-check:
    name: Verify recent function activity
    runs-on: ubuntu-latest
    # Reuses the deploy identity's federated credential, whose subject is
    # scoped to the 'production' environment.
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Azure login
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: bash .github/scripts/azure-login.sh

      - name: Check for recent schedule passes
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: bash .github/scripts/check-stability.sh
