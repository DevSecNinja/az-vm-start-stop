---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    uses: DevSecNinja/.github/.github/workflows/lint.yml@20bbfb951fc715ea1a30c6ed75032aa0acc0337e # v2.1.0
    permissions:
      contents: read
      security-events: write
    with:
      # renovate: datasource=github-releases depName=jdx/mise
      mise-version: "2026.7.5"
      # Standard lint config files are synced to the repo root by config-sync.
      lint-config-dir: "."
      # Optional: fail this workflow when a linter fails (default: false).
      # lint-fail-on-error: true
