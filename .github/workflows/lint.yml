---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    uses: DevSecNinja/.github/.github/workflows/lint.yml@783a7a3a03ae71efcdf5b13eaea80efe26dfa641 # v2.2.0
    permissions:
      contents: read
      security-events: write
    with:
      # renovate: datasource=github-releases depName=jdx/mise
      mise-version: "2026.7.0"
      # Standard lint config files are synced to the repo root by config-sync.
      lint-config-dir: "."
      # Optional: fail this workflow when a linter fails (default: false).
      # lint-fail-on-error: true
