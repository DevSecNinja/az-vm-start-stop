---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    # TEMP: pinned to the fix/lint-mise-tool-activation commit (DevSecNinja/.github#239)
    # so lint installs tools from this repo's .mise.toml. Revert to the released
    # tag once #239 is merged and released (Renovate will bump it).
    uses: DevSecNinja/.github/.github/workflows/lint.yml@7b175572ed80f4d8430e58f824cd75c1f492ed6c # fix/lint-mise-tool-activation
    permissions:
      contents: read
      security-events: write
    with:
      # renovate: datasource=github-releases depName=jdx/mise
      mise-version: "2026.6.11"
      # Optional: fail this workflow when a linter fails (default: false).
      # lint-fail-on-error: true
