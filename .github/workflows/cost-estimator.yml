---
name: Cost Estimator

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/cost-estimator.yml'
      - '.github/scripts/azure-login.sh'
      - '.github/scripts/verify-resource-group.sh'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  estimate:
    name: Estimate infra cost
    if: >-
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository) &&
      vars.AZURE_CLIENT_ID != '' &&
      vars.AZURE_TENANT_ID != '' &&
      vars.AZURE_SUBSCRIPTION_ID != '' &&
      vars.AZURE_RESOURCE_GROUP != '' &&
      vars.AZURE_NAME_PREFIX != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Azure login
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: bash .github/scripts/azure-login.sh

      - name: Verify resource group exists
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: bash .github/scripts/verify-resource-group.sh

      - name: Prepare report directory
        run: mkdir -p "${RUNNER_TEMP}/ace-report"

      - name: Estimate infrastructure cost
        uses: TheCloudTheory/azure-cost-estimator-action@0ffde68fc769a28e5c5b5b60885e8305047c42bf # 0.0.15-preview
        with:
          template-file: infra/main.bicep
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ vars.AZURE_RESOURCE_GROUP }}
          inline-parameters: '{"namePrefix":"${{ vars.AZURE_NAME_PREFIX }}"}'
          generate-json-output: 'true'
          json-output-filename: ${{ runner.temp }}/ace-report/estimate.json
          stdout: 'true'
          output-format: Table

      - name: Publish cost summary
        shell: bash
        run: |
          json_report="${RUNNER_TEMP}/ace-report/estimate.json"
          if [[ -f "${json_report}" ]]; then
            {
              echo '## Azure cost estimate'
              echo
              echo '```json'
              cat "${json_report}"
              echo
              echo '```'
            } >>"${GITHUB_STEP_SUMMARY}"
          fi
